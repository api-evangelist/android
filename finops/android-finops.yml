specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Android
providerId: android
publisherName: Google LLC
serviceCategory: Mobile Development Platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Android
  - Google Play
  - Maps
  - Firebase
  - AdMob
description: >-
  FOCUS-aligned FinOps for the Android ecosystem. The platform mixes free
  on-device SDKs with three monetized surfaces — Google Play (take rate on
  paid apps / IAP / subscriptions plus a one-time $25 developer registration),
  Google Maps Platform (per-1000-call usage charges with a 10K monthly free
  allowance), and Firebase / Google Cloud (pay-as-you-go on Cloud Storage,
  Firestore, RTDB, etc.). AdMob runs in the opposite direction as a publisher
  revenue share. All Android-related Google charges flow through Google Cloud
  / Google Play billing accounts and are visible in Cloud Billing exports
  (BigQuery), Play Console financial reports, and Firebase usage tabs.
sources:
  - https://support.google.com/googleplay/android-developer/answer/112622
  - https://developers.google.com/maps/billing-and-pricing/pricing
  - https://firebase.google.com/pricing
  - https://cloud.google.com/billing/docs/how-to/export-data-bigquery
billingModel:
  pricingCategory: Take Rate + Pay-As-You-Go + Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: Android Platform (Google Play, Maps, Firebase, AdMob)
  ServiceCategory: Mobile Development Platform
  ProviderName: Google
  PublisherName: Google LLC
  InvoiceIssuerName: Google LLC (region-specific Google entity)
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: play_developer_registration
    description: One-time $25 developer account fee
    unit: account
    aggregation: count
    dimensions:
      - account
  - name: play_paid_app_revenue
    description: Gross revenue from paid app downloads and in-app purchases sold via Google Play Billing
    unit: USD
    aggregation: sum
    dimensions:
      - app
      - country
      - revenue_tier
  - name: play_service_fee
    description: Service fee retained by Google (15% on first $1M, 30% above; 15% on subscriptions)
    unit: USD
    aggregation: sum
    dimensions:
      - app
      - country
      - fee_tier
  - name: play_subscription_revenue
    description: Auto-renewing subscription revenue
    unit: USD
    aggregation: sum
    dimensions:
      - app
      - product_id
      - country
  - name: maps_api_calls
    description: Billable Google Maps Platform calls beyond the 10K monthly free events
    unit: request
    aggregation: sum
    dimensions:
      - product
      - api_key
      - country
  - name: firebase_storage_gb
    description: GB stored across Firebase Cloud Storage / RTDB / Firestore
    unit: GB-month
    aggregation: max
    dimensions:
      - service
      - region
      - project
  - name: firebase_egress_gb
    description: GB downloaded / egressed from Firebase services
    unit: GB
    aggregation: sum
    dimensions:
      - service
      - region
      - project
  - name: firestore_reads_writes
    description: Firestore document operations beyond the Spark allowance
    unit: operation
    aggregation: sum
    dimensions:
      - operation_type
      - region
      - project
  - name: auth_mau
    description: Authentication monthly active users beyond the Spark 50K cap
    unit: user
    aggregation: max
    dimensions:
      - project
      - region
  - name: admob_ad_revenue
    description: Ad revenue paid out to the publisher (negative cost / inflow)
    unit: USD
    aggregation: sum
    dimensions:
      - app
      - ad_unit
      - country
      - format
  - name: play_developer_api_quota
    description: Calls against the Google Play Developer API (informational; not directly billed)
    unit: request
    aggregation: sum
    dimensions:
      - bucket
      - project
principles:
  - name: Visibility
    description: >-
      Combine Cloud Billing BigQuery exports for Firebase / Maps spend, the
      Google Play Console financial reports for app and IAP earnings, and the
      AdMob payouts report for ad revenue. Use Google Cloud Console > Billing
      > Reports for cross-product cost views.
  - name: Allocation
    description: >-
      Tag Google Cloud projects per app or environment (dev / staging / prod);
      use distinct API keys per app for Maps so per-app spend can be sliced.
      Allocate Google Play earnings by package name and country in the Play
      financial CSV.
  - name: Optimization
    description: >-
      Stay under Maps' 10K monthly free events through caching and request
      consolidation; right-size Firestore indexes and avoid hot documents to
      respect the 1 write/sec/document soft limit; keep app revenue in the 15%
      tier as long as possible by structuring multiple developer accounts only
      where Google's policy allows; use AdMob mediation to maximize fill at
      the floor price you set.
  - name: Accountability
    description: >-
      Mobile / app team owns Maps and Firebase budgets per project; finance
      reconciles Play payouts and AdMob payouts against the Google merchant
      accounts. Set Cloud Billing budget alerts per project and Play Console
      payout monitoring per app.
maintainers:
