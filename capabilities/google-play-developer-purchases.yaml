      path: /applications/{packageName}/purchases/subscriptions/{subscriptionId}/tokens/{token}:acknowledge
      operations:
      - name: acknowledgepurchasesubscription
        method: POST
        description: Acknowledge a Subscription Purchase
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
