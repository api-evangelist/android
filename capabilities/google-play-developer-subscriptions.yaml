          in: query
          type: integer
          description: Maximum number of offers to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for pagination.
      - name: createsubscriptionoffer
        method: POST
        description: Create a Subscription Offer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
