generated: '2026-06-20'
method: searched
source: https://developers.google.com/android-publisher/libraries
notes: >-
  Official Google API client libraries expose the Google Play Developer API
  (androidpublisher v3) — the one machine-readable API captured in this repo.
  The Android platform / Jetpack / Firebase SDKs are distributed as Maven
  (google) artifacts but are framework SDKs rather than API client libraries;
  the first-party developer binary is the Android CLI (see cli/).
packages:
  - language: java
    registry: maven
    name: com.google.apis:google-api-services-androidpublisher
    url: https://mvnrepository.com/artifact/com.google.apis/google-api-services-androidpublisher
    install: 'implementation("com.google.apis:google-api-services-androidpublisher:v3-rev20260318-2.0.0")'
    official: true
  - language: python
    registry: pypi
    name: google-api-python-client
    url: https://pypi.org/project/google-api-python-client/
    install: pip install google-api-python-client
    official: true
    note: Generic Google API client; build('androidpublisher', 'v3') via discovery.
  - language: javascript
    registry: npm
    name: googleapis
    url: https://www.npmjs.com/package/googleapis
    install: npm install googleapis
    official: true
    note: Generic Google APIs client; exposes google.androidpublisher('v3').
  - language: dotnet
    registry: nuget
    name: Google.Apis.AndroidPublisher.v3
    url: https://www.nuget.org/packages/Google.Apis.AndroidPublisher.v3
    install: dotnet add package Google.Apis.AndroidPublisher.v3
    official: true
  - language: go
    registry: pkg.go.dev
    name: google.golang.org/api/androidpublisher/v3
    url: https://pkg.go.dev/google.golang.org/api/androidpublisher/v3
    install: go get google.golang.org/api/androidpublisher/v3
    official: true
  - language: ruby
    registry: rubygems
    name: google-apis-androidpublisher_v3
    url: https://rubygems.org/gems/google-apis-androidpublisher_v3
    install: gem install google-apis-androidpublisher_v3
    official: true
  - language: php
    registry: packagist
    name: google/apiclient
    url: https://packagist.org/packages/google/apiclient
    install: composer require google/apiclient
    official: true
    note: Generic Google API client; Google\Service\AndroidPublisher service class.
  - language: cli
    registry: homebrew
    name: android-cli
    url: https://developer.android.com/tools/agents/android-cli
    install: brew tap android/tap && brew install android-cli
    official: true
    note: First-party Android CLI binary (stable 1.0). See cli/android-cli.yml for command surface.
